interface:
  display_name: "GitHub Capability Validator"
  short_description: "Analyze README claims and verify them in code."
  default_prompt: "Use $github-repo-capability-validator to extract a repository's core capabilities from its README, clone the repository locally, decompose the analysis into reviewable task documents, verify each claim against the checked out codebase, and save the results as a report bundle in the current workspace's fixed reports/ directory using the directory pattern <repo-name>-capability-audit/. Create 00-task-breakdown.md first, then 01-readme-capability-extraction.md, 02-entrypoints-and-main-flow.md, one file per capability, and 99-final-consistency-summary.md. For each capability, explain concrete implementation mechanics, state or lifecycle flow, data flow, storage boundaries, and rebuildability when evidence exists. Every capability must include confidence and validation status. If README and code differ, include a mismatch classification. Evidence grade is recommended when it improves rigor. If clone fails, stop and report the blocker. Use GitHub PRs only as secondary supporting evidence."
